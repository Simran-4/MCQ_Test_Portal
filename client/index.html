<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MCQ Test Portal</title>
    <style>
      /* LANGUAGE SWITCHER */
      #lang-switcher {
        position: fixed;
        top: 20px;
        left: 20px;
        z-index: 999999;
        display: flex;
        align-items: center;
        gap: 8px;
        background: linear-gradient(135deg, #1f4037, #2c7744);
        padding: 8px 14px;
        border-radius: 50px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
        cursor: grab;
        user-select: none;
        touch-action: none;
      }

      #lang-switcher.dragging {
        cursor: grabbing;
      }

      #lang-switcher .lang-icon {
        font-size: 16px;
        color: white;
        opacity: 0.9;
      }

      #lang-switcher select {
        background: transparent;
        border: none;
        color: white;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        outline: none;
        appearance: none;
        -webkit-appearance: none;
        padding-right: 20px;
        font-family: Arial, sans-serif;
        letter-spacing: 0.5px;
      }

      #lang-switcher select {
        cursor: pointer;
      }

      #lang-switcher select option {
        background: #1f4037;
        color: white;
        font-weight: 600;
      }

      #lang-switcher .arrow {
        color: white;
        font-size: 11px;
        opacity: 0.8;
        pointer-events: none;
        margin-left: -18px;
      }

      /* hide google translate bar at top */
      .goog-te-banner-frame,
      .skiptranslate {
        display: none !important;
      }

      body {
        top: 0 !important;
      }

      /* hide google branding inside widget */
      #google_translate_element {
        display: none !important;
      }
    </style>
  </head>
  <body>

    <!-- CUSTOM LANGUAGE SWITCHER -->
    <div id="lang-switcher" title="Drag to move language selector">
      <span class="lang-icon">🌐</span>
      <select id="lang-select" onchange="changeLanguage(this.value)">
        <option value="en">English</option>
        <option value="hi">हिंदी</option>
        <option value="mr">मराठी</option>
      </select>
      <span class="arrow">▼</span>
    </div>

    <!-- HIDDEN GOOGLE TRANSLATE ELEMENT -->
    <div id="google_translate_element"></div>

    <div id="root"></div>

    <script type="module" src="/src/main.jsx"></script>

    <script>
      // INIT GOOGLE TRANSLATE
      function googleTranslateElementInit() {
        new google.translate.TranslateElement(
          {
            pageLanguage: "en",
            includedLanguages: "en,hi,mr",
            autoDisplay: false,
          },
          "google_translate_element"
        );
      }

      // CHANGE LANGUAGE FUNCTION
      function changeLanguage(lang) {
        // find the google translate select
        const gtSelect = document.querySelector(".goog-te-combo");
        if (gtSelect) {
          gtSelect.value = lang;
          gtSelect.dispatchEvent(new Event("change"));
        }
      }

      // RESTORE SELECTED LANGUAGE ON RELOAD
      window.addEventListener("load", () => {
        const saved = localStorage.getItem("selectedLang");
        if (saved && saved !== "en") {
          document.getElementById("lang-select").value = saved;
          setTimeout(() => changeLanguage(saved), 1500);
        }
      });

      // SAVE LANGUAGE CHOICE
      document.addEventListener("DOMContentLoaded", () => {
        const langSelect = document.getElementById("lang-select");
        const switcher = document.getElementById("lang-switcher");
        const savedPosition = localStorage.getItem("langSwitcherPosition");

        const clamp = (value, min, max) => Math.max(min, Math.min(value, max));

        const placeSwitcher = (left, top) => {
          const rect = switcher.getBoundingClientRect();
          const nextLeft = clamp(left, 8, window.innerWidth - rect.width - 8);
          const nextTop = clamp(top, 8, window.innerHeight - rect.height - 8);
          switcher.style.left = `${nextLeft}px`;
          switcher.style.top = `${nextTop}px`;
          switcher.style.right = "auto";
          switcher.style.bottom = "auto";
          return { left: nextLeft, top: nextTop };
        };

        if (savedPosition) {
          try {
            const { left, top } = JSON.parse(savedPosition);
            if (Number.isFinite(left) && Number.isFinite(top)) {
              requestAnimationFrame(() => placeSwitcher(left, top));
            }
          } catch {}
        }

        let dragState = null;
        switcher.addEventListener("pointerdown", (e) => {
          if (e.target.closest("select")) return;
          const rect = switcher.getBoundingClientRect();
          dragState = {
            pointerId: e.pointerId,
            offsetX: e.clientX - rect.left,
            offsetY: e.clientY - rect.top,
          };
          switcher.classList.add("dragging");
          switcher.setPointerCapture(e.pointerId);
        });

        switcher.addEventListener("pointermove", (e) => {
          if (!dragState || e.pointerId !== dragState.pointerId) return;
          const pos = placeSwitcher(e.clientX - dragState.offsetX, e.clientY - dragState.offsetY);
          localStorage.setItem("langSwitcherPosition", JSON.stringify(pos));
        });

        const stopDrag = (e) => {
          if (!dragState || e.pointerId !== dragState.pointerId) return;
          switcher.classList.remove("dragging");
          switcher.releasePointerCapture(e.pointerId);
          dragState = null;
        };

        switcher.addEventListener("pointerup", stopDrag);
        switcher.addEventListener("pointercancel", stopDrag);
        window.addEventListener("resize", () => {
          const rect = switcher.getBoundingClientRect();
          const pos = placeSwitcher(rect.left, rect.top);
          localStorage.setItem("langSwitcherPosition", JSON.stringify(pos));
        });

        langSelect.addEventListener("change", (e) => {
          localStorage.setItem("selectedLang", e.target.value);
        });
      });
    </script>

    <script src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
  </body>
</html>
