<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MCQ Test Portal</title>
    <style>
      /* LANGUAGE SWITCHER */
      #lang-switcher {
        position: fixed;
        left: 18px;
        bottom: 18px;
        z-index: 999999;
        display: flex;
        align-items: center;
        gap: 8px;
        background: linear-gradient(135deg, #1f4037, #2c7744);
        padding: 8px 14px;
        border-radius: 50px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
        cursor: default;
        user-select: none;
        touch-action: manipulation;
      }

      #lang-switcher.dragging {
        cursor: default;
      }

      #lang-switcher .lang-icon {
        font-size: 16px;
        color: white;
        opacity: 0.9;
      }

      #lang-switcher select {
        background: transparent;
        border: none;
        color: white;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        outline: none;
        appearance: none;
        -webkit-appearance: none;
        padding-right: 20px;
        font-family: Arial, sans-serif;
        letter-spacing: 0.5px;
      }

      #lang-switcher select {
        cursor: pointer;
      }

      #lang-switcher select option {
        background: #1f4037;
        color: white;
        font-weight: 600;
      }

      #lang-switcher .arrow {
        color: white;
        font-size: 11px;
        opacity: 0.8;
        pointer-events: none;
        margin-left: -18px;
      }

      /* hide google translate bar at top */
      .goog-te-banner-frame,
      .skiptranslate {
        display: none !important;
      }

      body {
        top: 0 !important;
      }

      /* hide google branding inside widget */
      #google_translate_element {
        display: none !important;
      }
    </style>
  </head>
  <body>

    <!-- CUSTOM LANGUAGE SWITCHER -->
    <div id="lang-switcher" title="Drag to move language selector">
      <span class="lang-icon">🌐</span>
      <select id="lang-select" onchange="changeLanguage(this.value)">
        <option value="en">English</option>
        <option value="hi">हिंदी</option>
        <option value="mr">मराठी</option>
      </select>
      <span class="arrow">▼</span>
    </div>

    <div id="root"></div>

    <script type="module" src="/src/main.jsx"></script>

    <script>
      // CHANGE LANGUAGE FUNCTION
      function changeLanguage(lang) {
        document.documentElement.lang = lang || "en";
      }

      // RESTORE SELECTED LANGUAGE ON RELOAD
      window.addEventListener("load", () => {
        const saved = localStorage.getItem("selectedLang");
        if (saved && saved !== "en") {
          document.getElementById("lang-select").value = saved;
          changeLanguage(saved);
        }
      });

      // SAVE LANGUAGE CHOICE
      document.addEventListener("DOMContentLoaded", () => {
        const langSelect = document.getElementById("lang-select");
        localStorage.removeItem("langSwitcherPosition");

        langSelect.addEventListener("change", (e) => {
          localStorage.setItem("selectedLang", e.target.value);
        });
      });
    </script>

  </body>
</html>
